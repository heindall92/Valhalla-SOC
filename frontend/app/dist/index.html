  <body data-scheme="green" data-scan="on">
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.body.innerHTML = '<div style="color:red; font-size:24px; padding:20px; z-index:999999; position:absolute; background:black; top:0; left:0; width:100%; height:100%;">ERROR: ' + msg + '<br>Line: ' + line + '<br>Stack: ' + (error ? error.stack : '') + '</div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML = '<div style="color:red; font-size:24px; padding:20px; z-index:999999; position:absolute; background:black; top:0; left:0; width:100%; height:100%;">PROMISE ERROR: ' + event.reason + '</div>';
      });
    </script>
