# ═══════════════════════════════════════════════════════════
# Cowrie Configuration for Valhalla SOC
# SSH/Telnet Honeypot — Captures real attacks
# ═══════════════════════════════════════════════════════════

[honeypot]
# Hostname displayed to attackers
hostname = production-server
# Fake OS for banner
kernel_version = 5.15.0-91-generic
kernel_build_string = #101-Ubuntu SMP Tue Nov 14 13:30:08 UTC 2023
hardware_platform = x86_64
operating_system = GNU/Linux

# Log directory
log_path = var/log/cowrie
download_path = var/lib/cowrie/downloads
tty_log_path = var/lib/cowrie/tty

# Log ALL interaction details
log_flua = true

[ssh]
# SSH honeypot listening port
listen_endpoints = tcp:2222:interface=0.0.0.0
# SSH version string — mimic a real OpenSSH server
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6
enabled = true

[telnet]
# Telnet honeypot  
listen_endpoints = tcp:2223:interface=0.0.0.0
enabled = true

# ──────────────────────────────────────────────────
# OUTPUT PLUGINS — JSON Log (critical for our watcher)
# ──────────────────────────────────────────────────

[output_jsonlog]
enabled = true
logfile = var/log/cowrie/cowrie.json
epoch_timestamp = false

[output_textlog]
enabled = true
logfile = var/log/cowrie/cowrie.log

# ──────────────────────────────────────────────────
# INTERACTION SETTINGS
# ──────────────────────────────────────────────────

[shell]
# Fake filesystem for the attacker to explore
filesystem = share/cowrie/fs.pickle

# Maximum command length
cmd_max_length = 500

# Commands to capture
exec_enabled = true

[proxy]
# Don't proxy — this is a standalone honeypot
enabled = false
