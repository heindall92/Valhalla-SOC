<!--
═══════════════════════════════════════════════════════════
  Valhalla SOC — Wazuh Manager Configuration (ossec.conf)
  
  Configures Wazuh to:
  1. Monitor Cowrie honeypot JSON logs
  2. Apply custom decoders and rules
  3. Forward alerts to Valhalla Backend via integration
═══════════════════════════════════════════════════════════
-->

<ossec_config>

  <!-- ════════ GLOBAL ════════ -->
  <global>
    <logall>no</logall>
    <logall_json>yes</logall_json>
    <email_notification>no</email_notification>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
  </global>

  <!-- ════════ ALERTS ════════ -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>99</email_alert_level>
  </alerts>

  <!-- ════════ LOGGING ════════ -->
  <logging>
    <log_format>json</log_format>
  </logging>

  <!-- ════════ MONITOR COWRIE LOGS ════════ -->
  <!-- 
    This is the critical piece: Wazuh reads Cowrie's JSON log file
    and applies our custom decoders + rules to generate alerts.
    The log file is shared via Docker volume.
  -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/cowrie/cowrie.json</location>
    <label key="log_type">cowrie</label>
  </localfile>

  <!-- Monitor Ollama AI Analysis Logs -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/ossec/logs/ollama-analysis.json</location>
    <label key="log_type">ollama</label>
  </localfile>

  <!-- ════════ INTEGRATION: OLLAMA AI ════════ -->
  <!--
    When Wazuh generates an alert (level >= 5), it calls the
    custom-ollama integration script which queries the local AI
    and writes the response to a file for ingestion.
  -->
  <integration>
    <name>custom-ollama</name>
    <hook_url>http://localhost</hook_url>
    <level>5</level>
    <alert_format>json</alert_format>
  </integration>

  <!-- ════════ CUSTOM RULES AND DECODERS ════════ -->
  <ruleset>
    <!-- Custom Cowrie decoders and rules (bind-mounted) -->
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>

    <!-- Default Wazuh rules (SSH, syslog, etc.) -->
    <rule_dir>ruleset/rules</rule_dir>
    <decoder_dir>ruleset/decoders</decoder_dir>
  </ruleset>

  <!-- ════════ SYSCHECK (File Integrity Monitoring) ════════ -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories check_all="yes" report_changes="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories check_all="yes" report_changes="yes">/bin,/sbin</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
  </syscheck>

  <!-- ════════ ROOTCHECK ════════ -->
  <rootcheck>
    <disabled>no</disabled>
    <check_unixaudit>yes</check_unixaudit>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_sys>yes</check_sys>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- ════════ VULNERABILITY DETECTION (Wazuh 4.9+ syntax) ════════ -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <!-- ════════ AUTH (Agent registration) ════════ -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
  </auth>

  <!-- ════════ REMOTE (Agent communication) ════════ -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

</ossec_config>
