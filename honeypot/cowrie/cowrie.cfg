# ═══════════════════════════════════════════════════════════
# Cowrie — Configuración del Honeypot  (Valhalla SOC)
# SSH/Telnet Honeypot — captura intentos de ataque reales
# Versión STANDALONE: solo Cowrie, logs JSON listos para
# ser consumidos por el backend FastAPI.
# ═══════════════════════════════════════════════════════════

[honeypot]
# Hostname que el atacante ve al conectar
hostname = production-server

# Simulamos un kernel Ubuntu LTS moderno
kernel_version = 5.15.0-91-generic
kernel_build_string = #101-Ubuntu SMP Tue Nov 14 13:30:08 UTC 2023
hardware_platform = x86_64
operating_system = GNU/Linux

# Rutas (relativas a COWRIE_HOME=/cowrie/cowrie-git)
log_path = var/log/cowrie
download_path = var/lib/cowrie/downloads
tty_log_path = var/lib/cowrie/tty

# Loguear toda la interacción lua detallada
log_flua = true

# Idioma del intérprete — usamos 'en' para máxima compatibilidad
# con el decoder de Wazuh / parsers del backend
reported_ssh_port = 22

# Autenticación: número de intentos antes de permitir entrar
auth_class = UserDB
auth_class_parameters = etc/userdb.txt

# ──────────────────────────────────────────────────
# SSH
# ──────────────────────────────────────────────────
[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0

# Banner falso — lo más realista posible
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6

# Permitimos root login (el atractor principal para los bots)
# La lógica de qué credenciales pasan está en userdb.txt
sftp_enabled = true
forwarding = false
forward_redirect = false
forward_tunnel = false

# ──────────────────────────────────────────────────
# Telnet
# ──────────────────────────────────────────────────
[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

# ──────────────────────────────────────────────────
# OUTPUT PLUGIN: JSON LOG
# ──────────────────────────────────────────────────
# Crítico — el backend FastAPI hace tail de este fichero.
[output_jsonlog]
enabled = true
logfile = var/log/cowrie/cowrie.json
epoch_timestamp = false

# ──────────────────────────────────────────────────
# OUTPUT PLUGIN: TEXT LOG (humano)
# ──────────────────────────────────────────────────
[output_textlog]
enabled = true
logfile = var/log/cowrie/cowrie.log

# ──────────────────────────────────────────────────
# SHELL — shell falsa donde cae el atacante
# ──────────────────────────────────────────────────
[shell]
# Filesystem falso (pickle) — incluido con la imagen oficial.
# RUTA ABSOLUTA: versiones recientes de la imagen cowrie/cowrie:latest cambian
# el cwd del proceso, asi que la ruta relativa "share/cowrie/fs.pickle" acaba
# en FileNotFoundError y cierra el canal SSH con SystemExit:2 cuando el
# cliente pide PTY/shell (sintoma: "Channel closed" en paramiko, TC-07/09 KO).
filesystem = /cowrie/cowrie-git/src/cowrie/data/fs.pickle

# Longitud máxima de comando aceptada
cmd_max_length = 500

# Permitir exec (capturar comandos no-interactivos ej. `ssh host "uname -a"`)
exec_enabled = true

# Ubicación de procesos simulados — ruta absoluta por la misma razon que filesystem
processes = /cowrie/cowrie-git/src/cowrie/data/cmdoutput.json

# ──────────────────────────────────────────────────
# PROXY — deshabilitado (honeypot independiente)
# ──────────────────────────────────────────────────
[proxy]
enabled = false
