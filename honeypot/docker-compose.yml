# Valhalla SOC - Honeypot (Cowrie) - Standalone stack
#
# Bind-mounts a ./logs, ./downloads, ./tty directamente a las rutas
# donde Cowrie escribe. En Windows Docker Desktop los bind-mounts
# son permisivos (cualquier UID dentro del contenedor puede
# escribir), asi que no hace falta un Dockerfile custom.

services:
  cowrie:
    image: cowrie/cowrie:latest
    container_name: valhalla-cowrie
    hostname: production-server
    restart: unless-stopped

    ports:
      - "${COWRIE_SSH_PORT:-2222}:2222"
      - "${COWRIE_TELNET_PORT:-2223}:2223"

    volumes:
      # Config (read-only)
      - ./cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro

      # Logs, downloads, tty - bind-mount directo a la ruta real
      # de Cowrie. En Windows estos dirs en host seran accesibles
      # directamente.
      - ./logs:/cowrie/cowrie-git/var/log/cowrie
      - ./downloads:/cowrie/cowrie-git/var/lib/cowrie/downloads
      - ./tty:/cowrie/cowrie-git/var/lib/cowrie/tty

    environment:
      - COWRIE_OUTPUT_jsonlog_enabled=true
      - COWRIE_OUTPUT_jsonlog_logfile=/cowrie/cowrie-git/var/log/cowrie/cowrie.json
      - COWRIE_OUTPUT_textlog_enabled=true
      - COWRIE_OUTPUT_textlog_logfile=/cowrie/cowrie-git/var/log/cowrie/cowrie.log

    networks:
      - valhalla-net

    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2222 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  valhalla-net:
    name: valhalla-net
    driver: bridge
